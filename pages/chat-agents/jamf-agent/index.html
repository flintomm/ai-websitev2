<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Migration Notice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../assets/site-assistant/site-assistant.css" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --border: rgba(255,255,255,0.12);
      --text: #fff;
      --muted: rgba(255,255,255,0.58);
      --accent: #39ff14;
      --font: "Ubuntu", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background: radial-gradient(circle at 20% 18%, rgba(57,255,20,0.08), transparent 44%), #000;
    }

    .site-nav {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--accent); }

    .site-tag {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    main {
      max-width: 760px;
      margin: 3rem auto;
      padding: 0 1.2rem;
    }

    .stub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem);
      letter-spacing: -0.02em;
    }

    p {
      margin: 0.8rem 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .cta {
      margin-top: 1.1rem;
      display: inline-flex;
      border: 1px solid var(--border);
      padding: 0.55rem 0.88rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.67rem;
      font-weight: 700;
    }

    .cta:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a class="back-link" href="../../../index.html#section-4">< Flint</a>
    <span class="site-tag">Chat Agents</span>
  </nav>

  <main>
    <section class="stub-card" aria-label="Assistant migration notice">
      <h1>Assistant Updated</h1>
      <p>
        The standalone JAMF Agent page has been retired. The new assistant now lives in the persistent site header and follows you across pages.
      </p>
      <p>
        Unlock access once with your email to enable guided chat and interactive controls.
      </p>
      <a class="cta" href="../../../index.html#section-4">Return to Home</a>
    </section>
  </main>

  <script defer src="../../../assets/site-assistant/site-assistant.js"></script>
</body>
</html>
